[pytest]
minversion = 8.0
asyncio_mode = auto
testpaths =
    tests
pythonpath =
    .
addopts =
    -vv
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70
markers =
    unit: fast isolated tests with no external services
    integration: tests requiring PostgreSQL or application dependencies
    e2e: full-stack tests exercising deployed-like flows
    xml: SII XML generation and validation tests
    auth: authentication and authorization tests
    external: tests involving mocked third-party providers
filterwarnings =
    error
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:jose.*
