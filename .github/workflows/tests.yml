name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hme_fact_test
          POSTGRES_USER: hme_fact_test
          POSTGRES_PASSWORD: hme_fact_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hme_fact_test -d hme_fact_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      APP_NAME: HME Fact Test
      API_V1_PREFIX: /api/v1
      ENVIRONMENT: local
      DEBUG: "false"
      BACKEND_CORS_ORIGINS: "[]"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5433
      POSTGRES_DB: hme_fact_test
      POSTGRES_USER: hme_fact_test
      POSTGRES_PASSWORD: hme_fact_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET_KEY: test-secret-key-only-for-tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: WARNING
      SII_BASE_URL: https://sii.test.local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest
